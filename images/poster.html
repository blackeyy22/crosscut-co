<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <title>Photo Gallery</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Cinzel', serif;
            font-weight: 700;
            background-color: #0e080b;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        h1 {
            font-family:'Cinzel',serif;font-weight:700;
            font-size:clamp(1.8rem,3vw,3rem);
            text-align: center;
            color: rgb(240, 162, 46);
            margin-bottom: 30px;
        }
        
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
        }
        
        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 8px;
            background-color: #1b1616;
            aspect-ratio: 1 / 1;
            cursor: pointer;
            transition: transform 0.3s ease;
            font-family: 'Cinzel', serif;
            font-weight: 700;
            font-size: 18px;
            text-align: center;
            color: rgb(255, 255, 255);
        }
        
        .gallery-item:hover {
            transform: scale(1.05);
        }
        
        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(94, 16, 16, 0.7);
            color: rgb(240, 162, 46);
            padding: 15px;
            transform: translateY(100%);
            transition: transform 0.3s ease;
        }
        
        .gallery-item:hover .overlay {
            transform: translateY(0);
        }
        
        .overlay p {
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>POSTERS</h1>
        <div class="gallery">
            <div class="gallery-item">
                <img src="1k.png" alt="Photo 1" onclick="window.open('1k.png', '_blank')">
                
                <div class="overlay">
                    <p>Photo 1</p>
                </div>
            </div>
            <div class="gallery-item">
                <img src="blank.png" alt="Photo 2" onclick="window.open('blank.png', '_blank')">
                <div class="overlay">
                    <p>Photo 2</p>
                </div>
            </div>
            <div class="gallery-item">
                <img src="glimps of.png" alt="Photo 3" onclick="window.open('glimps of.png', '_blank')">
                <div class="overlay">
                    <p>Photo 3</p>
                </div>
            </div>
            <div class="gallery-item">
                <img src="love.png" alt="Photo 4" onclick="window.open('love.png', '_blank')">
                <div class="overlay">
                    <p>Photo 4</p>
                </div>
            </div>
            <div class="gallery-item">
                <img src="poster.png" alt="Photo 5" onclick="window.open('poster.png', '_blank')">
                <div class="overlay">
                    <p>Photo 5</p>
                </div>
            </div>
            <div class="gallery-item">
                <img src="sreya.png" alt="Coming Soon" onclick="window.open('sreya.png', '_blank')">
                <div class="overlay">
                    <p>Photo 6</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
