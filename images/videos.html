<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <title>Photo Gallery</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Cinzel', serif;
            font-weight: 700;
            background-color: #0e080b;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        h1 {
            font-family:'Cinzel',serif;font-weight:700;
            font-size:clamp(1.8rem,3vw,3rem);
            text-align: center;
            color: rgb(240, 162, 46);
            margin-bottom: 30px;
        }
        p  {
            font-family:'Cinzel',serif;
            font: size 50px;
            text-align: center;
            color: rgb(240, 162, 46);
            margin-bottom: 2%;
        }
         h2  {
            font-family:'Cinzel',serif;
            font: size 20px;
            text-align: center;
            color: rgb(255, 255, 255);
            margin-bottom: 15px;
        }
        
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
        }
        
        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 8px;
            background-color: #1b1616;
            aspect-ratio: 1 / 1;
            cursor: pointer;
            transition: transform 0.3s ease;
            font-family: 'Cinzel', serif;
            font-weight: 700;
            font-size: 18px;
            text-align: center;
            color: rgb(255, 255, 255);
        }
        
        .gallery-item:hover {
            transform: scale(1.05);
        }
        
        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .card {
            position: relative;
            overflow: hidden;
            border-radius: 8px;
            background-color: #1b1616;
            width: 100%;
        }
        
        .card video {
            width: 100%;
            height: auto;
            display: block;
        }
        
        .overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(94, 16, 16, 0.7);
            color: rgb(240, 162, 46);
            padding: 15px;
            transform: translateY(100%);
        }
        
        .gallery-item:hover .overlay {
            transform: translateY(0);
        }
        
        .overlay p {
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Video Gallery</h1>
    <div class="gallery">
      <div class="gallery-item">
                <img src="trip1.png" alt="Photo 3" onclick="window.open('https://drive.google.com/file/d/1Yvn_EbbM5VguDfac-9O6Bf0j1DHUs2XY/view?usp=sharing', '_blank')">
                <div class="overlay">
                    <p>click to play </p>
                </div>
            </div>
      <div class="gallery-item">
                <img src="trip2.png" alt="Photo 3" onclick="window.open('https://drive.google.com/file/d/13beX0VLm7tUvqpczMbTEC4f4_o9TZR1M/view?usp=sharing', '_blank')">
                <div class="overlay">
                    <p>click to play </p>
                </div>
            </div>
      
        </div>
      </article>
    </div>
    </div>
</body>     
</body>
</html>
